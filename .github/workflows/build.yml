name: Build VoiceMail APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true

      - name: Install SDK platforms
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1

      - name: Sign APK
        if: success()
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=VoiceMail, OU=Dev, O=VoiceMail, L=City, ST=State, C=BR"

      - name: Align and Sign
        if: success()
        run: |
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks debug.keystore --ks-key-alias debug --ks-pass pass:android --key-pass pass:android --out VoiceMail-v2.apk app-release-aligned.apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMail-APK
          path: VoiceMail-v2.apk
