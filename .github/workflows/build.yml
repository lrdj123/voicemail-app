name: Build VoiceMail APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true
      - name: Install SDK platforms
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace
      - name: Locate APK
        run: |
          echo "Arquivos APK encontrados:"
          find "$GITHUB_WORKSPACE" -type f -name "*.apk" -print
          echo "Conteúdo de app/build:"
          find app/build -maxdepth 6 -type f -print 2>/dev/null || true
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoiceMail-v2-APK
          path: |
            app/build/outputs/**/*.apk
            **/build/outputs/**/*.apk
          if-no-files-found: error
